name: FERBM CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Lint
        run: npm run lint

      - name: Run Production Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://ferbm.com
          PAYLOAD_SECRET: ferbm_placeholder_secret_key
          DATABASE_URI: postgresql://postgres:postgres@localhost:5432/ferbm
